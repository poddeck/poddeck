apiVersion: v1
kind: Service
metadata:
  name: {{ include "poddeck.fullname" . }}-core
  labels:
    {{- include "poddeck.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.core.apiPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.core.grpcPort }}
      targetPort: grpc
  selector:
    app.kubernetes.io/name: poddeck
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: core
---
# Separate service for gRPC (needs to be reachable by agents in other clusters)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "poddeck.fullname" . }}-grpc
  labels:
    {{- include "poddeck.labels" . | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  type: {{ .Values.core.grpcService.type }}
  ports:
    - name: grpc
      port: {{ .Values.core.grpcService.port }}
      targetPort: grpc
  selector:
    app.kubernetes.io/name: poddeck
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: core
