{{- $fullname := include "poddeck-agent.fullname" . -}}
{{- $namespace := .Release.Namespace -}}
{{- $roles := list "node-reader" "pod-admin" "namespace-admin" "events" "unit-admin" "service-admin" "cronjob-admin" "helm-secrets" -}}
{{- range $role := $roles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $fullname }}-{{ $role }}
  labels:
    {{- include "poddeck-agent.labels" $ | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}
    namespace: {{ $namespace }}
roleRef:
  kind: ClusterRole
  name: {{ $fullname }}-{{ $role }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
