services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DB_DATABASE:-poddeck}
      POSTGRES_USER: ${DB_USERNAME:-poddeck}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-poddeck}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  core:
    image: ghcr.io/poddeck/poddeck-core:latest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-poddeck}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:-poddeck}
      AUTH_KEY: ${AUTH_KEY:?AUTH_KEY is required}
      REFRESH_KEY: ${REFRESH_KEY:?REFRESH_KEY is required}
      GRPC_HOST: ${GRPC_HOST:-localhost}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    ports:
      - "${GRPC_PORT:-10101}:10101"
    # Optional: mount GeoLite2 database for session geo-location
    # volumes:
    #   - ./geo/GeoLite2-City.mmdb:/app/geo/GeoLite2-City.mmdb:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  panel:
    image: ghcr.io/poddeck/poddeck-panel:latest
    environment:
      CORE_URL: http://core:8080
    ports:
      - "${PANEL_PORT:-8081}:8081"
    depends_on:
      - core
    restart: unless-stopped

volumes:
  pgdata:
